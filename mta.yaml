_schema-version: 3.3.0
ID: hana-poc
version: 1.0.0

modules:

  - name: hana-poc-srv
    type: nodejs
    path: gen/srv
    parameters:
      instances: 1
    provides:
      - name: srv-api
        properties:
          srv-url: ${default-url}
    requires:
      - name: hana-poc-db
      - name: hana-poc-xsuaa

  - name: hana-poc-db-deployer
    type: hdb
    path: gen/db
    requires:
      - name: hana-poc-db

  - name: hana-poc-approuter
    type: nodejs
    path: approuter
    parameters:
      memory: 256M
    properties:
      destinations: >
        [
          {
            "name": "cap-backend",
            "url": "https://c38ba577trial-dev-hana-poc-srv.cfapps.us10-001.hana.ondemand.com",
            "forwardAuthToken": true
          }
        ]
    requires:
      - name: hana-poc-destination
      - name: hana-poc-xsuaa

resources:

  - name: hana-poc-db
    type: com.sap.xs.hdi-container
    parameters:
      service: hana
      service-plan: hdi-shared

  - name: hana-poc-destination
    type: org.cloudfoundry.managed-service
    parameters:
      service: destination
      service-plan: lite
      config:
        HTML5Runtime_enabled: true
        destinations:
          - Name: cap-backend
            URL: https://c38ba577trial-dev-hana-poc-srv.cfapps.us10-001.hana.ondemand.com
            Type: HTTP
            ProxyType: Internet
            Authentication: NoAuthentication
            forwardAuthToken: true

  - name: hana-poc-xsuaa
    type: org.cloudfoundry.managed-service
    parameters:
      service: xsuaa
      service-plan: application
      path: ./xs-security.json