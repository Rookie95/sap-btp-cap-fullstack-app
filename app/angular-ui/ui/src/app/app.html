<div class="container">
  <h2>📦 Product Management</h2>
  <div class="header">
    <button class="btn primary" (click)="addProduct()">+ Add Products</button>
  </div>
  <div class="card">
    <table>

      <thead>
        <tr>
          <th>ID</th>
          <th>Name</th>
          <th>Price</th>
          <th>Stock</th>
          <th>Actions</th>
        </tr>
      </thead>
      <tbody>
        @for(p of products(); track p.ID){
          <tr>
            <td>{{p.ID}}</td>
            <td>{{p.name}}</td>
            <td>₹ {{p.price}}</td>
            <td>{{p.stock}}</td>
            <td>
              <button class="btn edit" (click)="addProduct()">Edit</button>
              <button class="btn delete" (click)="editProduct(p)">Delete</button>
            </td>
          </tr>
        }
      </tbody>
    </table>
  </div>
</div>
